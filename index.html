<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Cinema Player</title>
    <style>
        /* Smooth scrolling for the whole page */
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 150vh; /* Extra height for scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f0f0f 0%, #000 100%);
            z-index: -1;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            font-weight: 100;
            letter-spacing: 12px;
            margin-bottom: 40px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 10px 25px;
            width: 350px;
            font-size: 16px;
        }

        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: #b30000;
            transform: scale(1.05);
        }

        /* Video Area */
        .video-container {
            width: 90%;
            max-width: 1100px;
            margin-bottom: 100px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .video-container.active {
            opacity: 1;
            transform: translateY(0);
        }

        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .scroll-hint {
            margin-top: 50px;
            font-size: 12px;
            color: #555;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <section class="hero">
        <h1>Cinema</h1>
        <div class="input-group">
            <input type="text" id="videoSource" placeholder="Paste Video ID or URL..." onkeydown="if(event.key === 'Enter') playVideo()">
            <button onclick="playVideo()">Launch</button>
        </div>
        <div class="scroll-hint">SCROLL DOWN FOR PLAYER</div>
    </section>

    <div id="videoArea" class="video-container">
        <div class="video-box">
            <iframe id="mainPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function playVideo() {
            const input = document.getElementById('videoSource').value.trim();
            const player = document.getElementById('mainPlayer');
            const container = document.getElementById('videoArea');

            if (input) {
                let videoId = input;

                if (input.includes('v=')) {
                    videoId = input.split('v=')[1].split('&')[0];
                } else if (input.includes('youtu.be/')) {
                    videoId = input.split('youtu.be/')[1].split('?')[0];
                }

                player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;

                container.classList.add('active');

                setTimeout(() => {
                    container.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            }
        }
    </script>

</body>
</html>
